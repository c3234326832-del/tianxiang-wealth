<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>提交成功 - 鼎盛证券</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; line-height: 1.6; color: #fff; }
        :root {
            --primary: #0a1628;
            --secondary: #1a2b4a;
            --accent: #d4af37;
            --accent-light: #f5d76e;
            --success: #10b981;
        }
        .success-page {
            min-height: 100vh;
            background: linear-gradient(180deg, var(--primary) 0%, var(--secondary) 100%);
            padding: 40px 20px;
            position: relative;
            overflow: hidden;
        }
        .success-page::before {
            content: ''; position: absolute; top: -50%; right: -20%;
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(212,175,55,0.1) 0%, transparent 70%);
            border-radius: 50%;
        }
        .success-container {
            max-width: 600px;
            width: 100%;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(212,175,55,0.2);
            border-radius: 24px;
            padding: 50px 35px;
            text-align: center;
            position: relative;
            z-index: 1;
            margin: 0 auto;
        }
        .success-icon {
            width: 100px; height: 100px;
            background: linear-gradient(135deg, var(--success), #059669);
            border-radius: 50%;
            margin: 0 auto 25px;
            display: flex; align-items: center; justify-content: center;
            font-size: 48px;
            box-shadow: 0 10px 40px rgba(16,185,129,0.3);
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        .success-title {
            font-size: 28px; font-weight: 700;
            margin-bottom: 15px;
        }
        .success-title span { color: var(--accent); }
        .success-desc {
            color: rgba(255,255,255,0.7);
            font-size: 15px;
            line-height: 1.8;
            margin-bottom: 30px;
        }
        .info-card {
            background: rgba(255,255,255,0.03);
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 30px;
            text-align: left;
        }
        .info-card h4 {
            color: var(--accent);
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 15px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .info-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .info-item:last-child { border-bottom: none; }
        .info-label { color: rgba(255,255,255,0.6); font-size: 14px; }
        .info-value { font-size: 14px; font-weight: 500; }
        .action-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--accent), var(--accent-light));
            color: var(--primary);
            padding: 14px 40px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            font-size: 15px;
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(212,175,55,0.4);
        }
        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: #fff;
            padding: 14px 40px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 500;
            font-size: 15px;
            transition: all 0.3s ease;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .btn-secondary:hover {
            background: rgba(255,255,255,0.15);
            border-color: var(--accent);
        }
        .tip-section {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .tip-title { font-size: 13px; font-weight: 600; margin-bottom: 10px; }
        .tip-text { font-size: 12px; color: rgba(255,255,255,0.6); line-height: 1.6; }
        @media (max-width: 576px) {
            .success-container { padding: 40px 25px; }
            .success-title { font-size: 24px; }
            .action-buttons { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="success-page">
        <div class="success-container">
            <div class="success-icon">✓</div>
            <h2 class="success-title">提交成功！<span>感谢您的信任</span></h2>
            <p class="success-desc">您的咨询信息已成功提交，我们的专业顾问将尽快与您联系，请保持电话畅通。</p>
            
            <div class="info-card">
                <h4>您的咨询信息</h4>
                <div class="info-item">
                    <span class="info-label">姓名</span>
                    <span class="info-value" id="display-name">-</span>
                </div>
                <div class="info-item">
                    <span class="info-label">手机号码</span>
                    <span class="info-value" id="display-phone">-</span>
                </div>
            </div>
            
            <div class="action-buttons">
                <a href="index.html" class="btn-primary">返回首页</a>
                <a href="tel:400-888-8888" class="btn-secondary">立即拨打</a>
            </div>
            
            <div class="tip-section">
                <div class="tip-title">温馨提示</div>
                <div class="tip-text">投资有风险，入市需谨慎。本公司提供的投资建议仅供参考，不构成任何投资决策依据。具体投资方案请与您的专属顾问沟通确认。</div>
            </div>
        </div>
    </div>

    <script>
        function getQueryParam(name) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(name);
        }

        document.getElementById('display-name').textContent = getQueryParam('name') || '-';
        document.getElementById('display-phone').textContent = getQueryParam('phone') || '-';
    </script>
</body>
</html>
